# BoC Rate Cut Backtest Spec — 2010-2024 fixed announcement dates
#
# Binary event-prediction backtest: at each forecast origin (the day before
# a BoC fixed announcement date), predict the probability that the Bank cuts
# its target for the overnight rate at the announcement. Scored with the
# Brier score (task payload_type: binary).
#
# Origins are EXPLICIT because BoC meetings are an irregular calendar —
# 8 dates per year that no pandas frequency alias can generate. Each origin
# is announcement_date - 1 day, so a 1-day horizon resolves exactly on the
# announcement and the cutoff discipline excludes the decision itself.
# The origin list is derived from ../meeting_schedule.yaml; a use-case test
# asserts the two files stay consistent.
#
# Origin count : 120 (8 per year, 2010-2024)
# Cut events   : 8 (2015 x2, 2020 x1, 2024 x5) — class imbalance is part of
#                the problem; a base-rate forecaster is hard to beat on Brier.
# Warmup       : 8 events (the full 2009 easing cycle is visible history at
#                every origin).

description: >-
  Backtest across all 120 BoC fixed announcement dates from 2010 through
  2024. At each origin (announcement date minus one day) predictors emit
  P(rate cut at tomorrow's announcement), resolved against the derived 0/1
  event series and scored with the Brier score. 2009 meetings are excluded
  as origins but visible as history.

task:
  task_id: boc_rate_cut_next_meeting
  target_series_id: boc_rate_cut_event
  horizons: [1]
  frequency: D
  payload_type: binary
  description: >-
    Will the Bank of Canada LOWER its target for the overnight rate at the
    fixed announcement date occurring one day after the forecast origin?
    Outcome is 1 if the target rate decreases at that announcement (any cut
    size), 0 otherwise (hold or hike). Announcements are at 09:45 ET; the
    forecast must be issued with information available the day before.

start: "2010-01-01"
end: "2024-12-31"
stride: 1
warmup: 8

