# Bank of Canada fixed announcement dates (FADs), 2009 - 2026.
#
# Why this file exists
# --------------------
# The BoC announces its target for the overnight rate on eight pre-scheduled
# dates per year (the fixed-announcement-date system, in effect since
# December 2000). No data provider publishes the *meeting calendar* as a
# series: the daily target-rate series (StatCan table 10-10-0139-01) only
# shows when the rate CHANGED, so "hold" decisions — the majority of
# meetings, and exactly the events a rate-cut forecaster must score — are
# invisible without this curated schedule.
#
# Provenance
# ----------
# Dates 2009-01-20 .. 2026-06-10 were extracted programmatically from the
# Bank of Canada website sitemap (June 2026): every interest-rate decision
# is published at https://www.bankofcanada.ca/<yyyy>/<mm>/fad-press-release-<yyyy-mm-dd>/
# and the slug encodes the announcement date. Two manual additions:
#   - 2010-03-02: missing from the sitemap; confirmed against the BoC's
#     published 2010 schedule (https://www.bankofcanada.ca/2009/07/bank-canada-releases-2010-schedule-dates/)
#     and the 2010-01-19 press release ("The next scheduled date ... is 2 March 2010").
#   - 2026-07-15 .. 2026-12-09: future dates from the BoC 2026 schedule
#     (https://www.bankofcanada.ca/core-functions/monetary-policy/key-interest-rate/).
#
# Scope and caveats
# -----------------
# - The fixed-date era began December 2000; dates before 2009 are not
#   included because the press-release slug convention (and hence the
#   programmatic extraction) starts in 2009. The reference backtest windows
#   start in 2010, with 2009 retained as visible event history.
# - UNSCHEDULED (emergency) rate moves are deliberately NOT in this list.
#   They are not fixed announcement dates and carry no scheduled forecast
#   origin. In the covered window there are two: 2020-03-13 and 2020-03-27
#   (COVID-19 intermeeting cuts). Event derivation compares the target rate
#   just before vs. just after each *scheduled* meeting, so intermeeting
#   moves simply shift the pre-meeting level and do not corrupt outcomes.
# - Announcements are made at 09:45 ET (10:00 ET before 2020). Since 2021 a
#   rate change takes effect the business day AFTER the announcement; before
#   that, the same day. The event-derivation logic in data.py handles both
#   regimes by reading the daily series strictly after the announcement date.
#
# Maintenance: append new dates when the BoC publishes the next year's
# schedule (typically each July). Keep this comment block accurate.

