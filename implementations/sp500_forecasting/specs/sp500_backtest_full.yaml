# Full multivariate S&P 500 backtest demo (longer window, more samples).
# Edit this file, then Run All in ``01_sp500_multivariate_backtest.ipynb``.

backtest:
  task:
    task_id: sp500_log_return_1b
    target_series_id: sp500_log_ret_1b
    horizons: [1]
    frequency: B
    description: >-
      Forecast next-session open vs prior close S&P500 log return.
  start: "2020-03-01"
  end: "2021-03-01"
  stride: 1
  warmup: 252
  description: >-
    COVID-era multivariate demo; forecast origins every business day in [start, end].

experiment:
  data_history_start: "2000-01-01"
  refresh_cache: false

  # Same ids as ``DEFAULT_COVARIATE_SERIES_IDS`` in ``data.py`` (gold may be skipped if FRED is unavailable).
  # Raw FRED daily feeds can include Saturday/Sunday rows (notably DFF / fed funds); ``data.py`` strips
  # those before registration so Darts regressors (``freq: B``) do not raise on ``TimeSeries.from_dataframe``.
  fast_covariate_series_ids:
    - vix_level_l1b
    - vix_log_ret_1b_l1b
    - ust10y_level_l1b
    - ust2y10y_spread_l1b
    - fed_funds_level_l1b
    - cpi_mom_logdiff_l1b
    - unemployment_rate_l1b
    - oil_log_ret_1b_l1b
    - gold_log_ret_1b_l1b
    - dollar_index_log_ret_1b_l1b
    - nasdaq_log_ret_1b_l1b

  run_models:
    linreg_target_only: true
    linreg_with_covariates: true
    lightgbm_target_only: true
    lightgbm_with_covariates: true
    autoarima_target_only: true

  lags: 5
  lags_past_covariates: 5
  num_samples: 200

  lightgbm_kwargs:
    num_threads: 1
    n_jobs: 1
    verbosity: -1
